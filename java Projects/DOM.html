<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DOM Interaction App</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      transition: 0.3s;
    }

    .container {
      max-width: 500px;
      margin: auto;
    }

    .item {
      margin: 5px 0;
    }

    button {
      margin-top: 10px;
      padding: 8px 12px;
      cursor: pointer;
    }

    input {
      padding: 8px;
      width: 100%;
      margin-top: 10px;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>

<div class="container">

  <h1 id="title">Welcome</h1>

  <p class="item">Item One</p>
  <p class="item">Item Two</p>

  <button id="bgBtn">Change Background</button>

  <input type="text" id="userInput" placeholder="Type something...">
  <p id="output"></p>

  <button id="toggleBtn">Toggle Message</button>
  <p id="message">This is a hidden message</p>

</div>

<script>
// Cache DOM
const title = document.getElementById("title");
const items = document.querySelectorAll(".item");
const bgBtn = document.getElementById("bgBtn");
const input = document.getElementById("userInput");
const output = document.getElementById("output");
const toggleBtn = document.getElementById("toggleBtn");
const message = document.getElementById("message");

// 1. Change title text
function updateTitle() {
  title.textContent = "DOM Updated Successfully";
}

// 2. Style multiple elements
function styleItems() {
  items.forEach(item => {
    item.style.color = "#007BFF";
    item.style.fontWeight = "bold";
  });
}

// 3. Change background
function changeBackground() {
  document.body.style.backgroundColor = "black";
}

// 4. Live input display
function handleInput(e) {
  output.textContent = e.target.value;
}

// 5. Toggle message
function toggleMessage() {
  message.classList.toggle("hidden");
}

// Event Listeners
bgBtn.addEventListener("click", changeBackground);
input.addEventListener("input", handleInput);
toggleBtn.addEventListener("click", toggleMessage);

// Initialize
updateTitle();
styleItems();
</script>

</body>
</html>
